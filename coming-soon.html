<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | NurtureBirth</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: var(--bg-color); height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .coming-container { max-width: 600px; padding: 40px; }
        .logo-large { font-size: 3rem; margin-bottom: 2rem; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="coming-container">
        <div class="logo-large brand-font">
            <i class="bi bi-heart-pulse-fill me-2"></i>NurtureBirth
        </div>
        <h1 class="brand-font display-4 mb-3">Preparing the Nest</h1>
        <p class="text-muted mb-5 lead">Our new digital home is currently in its third trimester. We are putting the finishing touches on a space designed to support your family's most sacred journey.</p>
        
        <div class="card p-4 border-0 shadow-sm bg-white">
            <h5 class="brand-font mb-3">Get Notified on Birth Day</h5>
            <form class="needs-validation" novalidate>
                <div class="input-group">
                    <input type="email" class="form-control" placeholder="Your email address" required>
                    <button class="btn btn-primary" type="submit">Notify Me</button>
                </div>
            </form>
            <p class="small text-muted mt-3 mb-0">We promise zero spam, only gentle updates.</p>
        </div>

        <div class="social-links mt-5 d-flex justify-content-center gap-4">
             <a href="#" class="text-muted"><i class="bi bi-facebook fs-4"></i></a>
             <a href="#" class="text-muted"><i class="bi bi-instagram fs-4"></i></a>
             <a href="#" class="text-muted"><i class="bi bi-linkedin fs-4"></i></a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
